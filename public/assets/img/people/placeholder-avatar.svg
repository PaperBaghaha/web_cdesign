<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Profile photo placeholder">
  <title>Profile photo placeholder</title>

  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8ea"/>
      <stop offset="100%" stop-color="#cfcfd4"/>
    </linearGradient>
    <linearGradient id="psilver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#6e6e6e"/>
    </linearGradient>
  </defs>

  <rect width="320" height="320" fill="url(#pbg)"/>

  <!-- Concentric rings echoing the site's geometric motif -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.5">
    <circle cx="160" cy="160" r="150" stroke-width="1"/>
    <circle cx="160" cy="160" r="126" stroke-width="1" stroke-dasharray="4 6"/>
  </g>

  <!-- Abstract figure -->
  <circle cx="160" cy="128" r="46" fill="url(#psilver)"/>
  <path d="M76 268 a84 84 0 0 1 168 0 Z" fill="url(#psilver)"/>

  <!-- Label -->
  <text
    x="160" y="300"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="13" font-weight="600" letter-spacing="2"
    fill="#6e6e6e" text-anchor="middle"
  >PHOTO PENDING</text>
</svg>
